<!-- blue kind -->
<body style="background-color:rgb(50, 98, 168);">

<div>
   <!-- yellow kind rgb(245, 241, 37)  -->
   <h1 style="font-size:7vw; color:rgb(245, 241, 37); max-width: fit-content; margin-left: auto; margin-right: auto; text-align: center;">Ranking Points Simulator 2026 (Poker Namur)</h1>
</div>

<div> <p style="font-size:5vw; color:white; text-align: center;"><a href="javascript:window.location.reload(true)">(Reload the page to restart)</a></p>
</div>

<script>
  
   let PlayersCount = ""
   while (PlayersCount == "") {
      PlayersCount = prompt("Enter number of Players Entries ?");   
      PlayersCount = PlayersCount.trim()
   }
   
   let TournamentTag = prompt("Enter Tournament Tag : [1] by default, [1.2] or main, [1.5], [2] or double ?");
   let TournamentTag_lower_case = TournamentTag.toLowerCase();
   
   let Position = ""
   while (Position == "") {
      Position = prompt("Enter Your Final Position ?");
      Position = Position.trim()
   }
   
   
   //alert(PlayersCount);
   //alert("TournamentTag : " + TournamentTag)

   let CoefficientPlayersCount = (PlayersCount <= 47 ? 122.5 :

            PlayersCount <= 55 ? 130.0 :

            PlayersCount <= 63 ? 137.5 :

            PlayersCount <= 71 ? 145.0 :

            PlayersCount <= 87 ? 152.5 :

            PlayersCount <= 103 ? 160.0 :

            PlayersCount <= 111 ? 167.5 :

            PlayersCount <= 135 ? 175.0 :

            PlayersCount <= 151 ? 182.5 :

            PlayersCount <= 175 ? 190.0 :

            PlayersCount <= 199 ? 197.5 :

            PlayersCount <= 255 ? 205.0 :

            PlayersCount <= 311 ? 212.5 :

            PlayersCount <= 359 ? 220.0 :

            PlayersCount <= 415 ? 227.5 :

            PlayersCount <= 471 ? 235.0 :

            PlayersCount <= 519 ? 242.5 :

            PlayersCount <= 575 ? 250.0 :

            PlayersCount <= 631 ? 257.5 :

            PlayersCount <= 679 ? 265.0 :

            PlayersCount <= 735 ? 272.5 :

            PlayersCount <= 791 ? 280.0 :

            PlayersCount <= 839 ? 287.5 :

            PlayersCount <= 895 ? 295.0 :

            PlayersCount <= 951 ? 302.5 :

            PlayersCount <= 999 ? 310.0 :

            PlayersCount <= 1055 ? 317.5 :

            PlayersCount <= 1111 ? 325.0 :

            PlayersCount <= 1159 ? 332.5 :

            PlayersCount <= 1215 ? 340.0 :

            PlayersCount <= 1271 ? 347.5 :

            PlayersCount <= 1319 ? 355.0 :

            PlayersCount <= 1375 ? 362.5 :

            PlayersCount <= 1431 ? 370.0 :

            PlayersCount <= 1511 ? 377.5 :

            PlayersCount <= 1600 ? 385.0 :

            PlayersCount <= 1700 ? 392.5 :

            PlayersCount <= 1800 ? 400.0 :

            PlayersCount <= 1900 ? 407.5 :

            PlayersCount <= 2000 ? 415.0 :

            PlayersCount <= 2150 ? 422.5 :

            PlayersCount <= 2300 ? 430.0 :

            PlayersCount <= 3100 ? 467.5 :

            PlayersCount <= 3500 ? 482.5 :

            PlayersCount <= 3700 ? 490.0 :

            PlayersCount <= 3900 ? 497.5 :

            PlayersCount <= 4100 ? 505.0 :

            505.0
            );

   //alert('CoefficientPlayersCount : ' + CoefficientPlayersCount);
   
   if (TournamentTag_lower_case == "1.2" || TournamentTag_lower_case == "1.20") {
      TournamentTag_lower_case = "main"
   };
   
   if (TournamentTag_lower_case == "2" || TournamentTag_lower_case == "2.0" || TournamentTag_lower_case == "2.00" ){ 
      TournamentTag_lower_case = "double"
   };

   
   let coefficient_tournament_tag = (
            TournamentTag_lower_case.includes("main") ? 1.20 :
            TournamentTag_lower_case.includes("double") ? 2.00 :
            TournamentTag_lower_case.includes("1.5") ? 1.50 : 
            1.0            
   );
          
   //alert("TournamentTag: " + TournamentTag);
   //alert("coefficient_tournament_tag : " + coefficient_tournament_tag);
   
   
   let step_1 = ((CoefficientPlayersCount * coefficient_tournament_tag) - 10);
   //alert("step_1: " + step_1);
   
   let max_PlayersCount_2 = Math.max(PlayersCount, 2.0);
   //alert("max_PlayersCount_2: " + max_PlayersCount_2);
   
   let exp_val_1 = Math.exp(6.0 * ((max_PlayersCount_2 - Position) / (max_PlayersCount_2 - 1.0)));
   //alert("exp_val_1: " + exp_val_1);
   
   let exp_val_2 = Math.exp(6.0);
   //alert("exp_val_2: " + exp_val_2);
      
   let step_2 = (exp_val_1 - 1.0) / (exp_val_2 - 1.0)
   //alert("step_2: " + step_2);
   
   let formula = step_1 * step_2 + 10;
   
   formula = formula.toFixed(2);
   alert("Result of Formula = " + formula);

</script>
